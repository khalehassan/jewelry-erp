<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>New Sale — Jewelry ERP</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
        h1 { font-size: 22px; }
        label { display: block; margin: 14px 0 4px; font-weight: 600; }
        select, input { width: 100%; padding: 8px; font-size: 16px; box-sizing: border-box; }
        .total { margin-top: 18px; font-size: 20px; font-weight: 700; }
        .grand { font-size: 26px; }
        .total span { color: #a9812f; }
        button { margin-top: 24px; padding: 12px 22px; font-size: 16px; font-weight: 700; background: #a9812f; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .msg { background: #e7f4ea; border: 1px solid #34a853; color: #1e7e34; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>New Sale</h1>

    {% if messages %}
        {% for message in messages %}
        <div class="msg">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="customer">Customer</label>
        <select id="customer" name="customer">
            <option value="">Walk-in customer</option>
            {% for c in customers %}
            <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
        </select>

        <label for="item">Item</label>
        <select id="item" name="item">
            {% for item in items %}
            <option value="{{ item.id }}" data-weight="{{ item.weight_grams }}">
                {{ item.name }} — {{ item.karat }}K, {{ item.weight_grams }}g
            </option>
            {% endfor %}
        </select>

        <label for="gold">Gold price per gram (EGP)</label>
        <input type="number" id="gold" name="gold" value="0" step="0.01">

        <label for="making">Making charge per gram (EGP)</label>
        <input type="number" id="making" name="making" value="0" step="0.01">

        <label for="qty">Quantity</label>
        <input type="number" id="qty" name="qty" value="1" step="1">

        <label for="discount">Discount (EGP)</label>
        <input type="number" id="discount" name="discount" value="0" step="0.01">

        <div class="total">Line total: <span id="lineTotal">0.00</span> EGP</div>
        <div class="total grand">Total after discount: <span id="grandTotal">0.00</span> EGP</div>

        <button type="submit">Save sale</button>
    </form>

    <script>
        const itemEl = document.getElementById("item");
        const goldEl = document.getElementById("gold");
        const makingEl = document.getElementById("making");
        const qtyEl = document.getElementById("qty");
        const discountEl = document.getElementById("discount");
        const lineTotalEl = document.getElementById("lineTotal");
        const grandTotalEl = document.getElementById("grandTotal");

        function fmt(n) {
            return n.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function recalculate() {
            const selected = itemEl.options[itemEl.selectedIndex];
            const weight = parseFloat(selected.dataset.weight) || 0;
            const gold = parseFloat(goldEl.value) || 0;
            const making = parseFloat(makingEl.value) || 0;
            const qty = parseInt(qtyEl.value) || 0;
            const discount = parseFloat(discountEl.value) || 0;
            const lineTotal = weight * (gold + making) * qty;
            lineTotalEl.textContent = fmt(lineTotal);
            grandTotalEl.textContent = fmt(lineTotal - discount);
        }

        [itemEl, goldEl, makingEl, qtyEl, discountEl].forEach(el => el.addEventListener("input", recalculate));
        recalculate();
    </script>
</body>
</html>
