{% extends "base.html" %}
{% block title %}New Customer — Jewelry ERP{% endblock %}

{% block head %}
<style>
    form.customer-form input { width:100%; }
</style>
{% endblock %}

{% block content %}
<h1>New Customer</h1>

<form method="post" class="card customer-form" style="max-width:560px;">
    {% csrf_token %}

    <label for="name">Name *</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">Phone</label>
    <input type="text" id="phone" name="phone">

    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <label for="address">Address</label>
    <input type="text" id="address" name="address">

    <label for="notes">Notes</label>
    <input type="text" id="notes" name="notes">

    <button type="submit" class="btn" style="margin-top:20px;">Save customer</button>
</form>

<div class="card" style="margin-top:22px;">
    <h2>Existing customers</h2>
    <table class="list">
        {% for c in customers %}
        <tr><td>{{ c.name }}</td><td class="num">{{ c.phone }}</td></tr>
        {% empty %}
        <tr><td class="sub">No customers yet.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
